[project]
name = "database"
version = "0.1.0"
description = "Shared database models and schemas for Mindris AI"
requires-python = ">=3.12"
dependencies = [
    "pydantic>=2.0.0",
]

[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["database"]
package-dir = {"database" = "."}
